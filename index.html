<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much weight can drywall hold without an anchor?","acceptedAnswer":{"@type":"Answer","text":"About 5\u201310 lbs with a nail alone. A small picture frame on a nail is fine, but anything heavier needs a proper anchor or \u2014 even better \u2014 a screw driven into a wall stud."}},{"@type":"Question","name":"What\u2019s the difference between a toggle bolt and a molly bolt?","acceptedAnswer":{"@type":"Answer","text":"Toggle bolts use spring-loaded wings that open behind the wall and grip a large area \u2014 they\u2019re the strongest option for hollow walls. Molly bolts use a metal sleeve that expands as you tighten the screw. They\u2019re medium strength but reusable: you can remove and reinsert the screw without losing the anchor."}},{"@type":"Question","name":"Can I use plastic anchors for a TV mount?","acceptedAnswer":{"@type":"Answer","text":"No. TVs create significant leverage force because the weight sits far from the wall. Plastic anchors can pull out. Use snap toggle bolts rated for the weight, or mount directly into wall studs with lag bolts."}},{"@type":"Question","name":"How do I know what kind of wall I have?","acceptedAnswer":{"@type":"Answer","text":"Knock on the wall: a hollow sound means drywall, a solid sound suggests plaster or masonry. Homes built before 1950 often have plaster and lath. You can also push a thumbtack in \u2014 it slides into drywall easily but won\u2019t penetrate plaster or concrete."}},{"@type":"Question","name":"What size drill bit do I need for a drywall anchor?","acceptedAnswer":{"@type":"Answer","text":"Check the anchor packaging \u2014 it lists the recommended bit size. Generally the bit should match the anchor body diameter (not the screw). Self-drilling anchors need no pre-drilling."}}]}</script>

<script>
(function(){
'use strict';
const WORKER_URL = 'https://hangright-api.sillymodes.workers.dev';
const AMAZON_TAG = 'sillymodes-20';
const app = document.getElementById('app');
let currentPage = '';
function route(){
  const hash = (location.hash || '#home').slice(1);
  if(hash === currentPage) return;
  currentPage = hash;
  document.querySelector('.nav-links').classList.remove('open');
  document.querySelectorAll('[data-nav]').forEach(a => {
    a.classList.toggle('active', a.dataset.nav === hash);
  });
  trackPageview(hash);
  switch(hash){
    case 'reviews': renderReviews(); break;
    case 'about': renderAbout(); break;
    case 'stats': renderStats(); break;
    default: renderHome(); break;
  }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
function trackPageview(path){
  try{
    fetch(WORKER_URL+'/api/pageview',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({path:'/'+path, referrer:document.referrer, user_agent:navigator.userAgent})
    }).catch(()=>{});

}
let wizardState = {step:1, wallType:'', item:'', weight:'', stud:''};
const wallTypes = [
  {id:'drywall_standard', label:'Drywall (\u00bd\u2033 standard)'},
  {id:'drywall_fire', label:'Drywall (\u215d\u2033 fire-rated)'},
  {id:'plaster', label:'Plaster & lath'},
  {id:'concrete', label:'Concrete / brick / stone'},
  {id:'hollow_door', label:'Hollow-core door'},
  {id:'tile', label:'Tile over drywall'},
  {id:'wood_panel', label:'Wood paneling'}
];
const hangItems = [
  {id:'picture_frame', label:'Picture frame / small art'},
  {id:'heavy_mirror', label:'Heavy mirror'},
  {id:'floating_shelf', label:'Floating shelf'},
  {id:'tv_mount', label:'TV mount'},
  {id:'curtain_rod', label:'Curtain rod / blinds'},
  {id:'towel_bar', label:'Towel bar / bathroom fixture'},
  {id:'coat_hook', label:'Coat hook / small fixture'},
  {id:'smoke_detector', label:'Smoke detector / thermostat'},
  {id:'cabinet', label:'Cabinet / heavy furniture'}
];
const weightClasses = [
  {id:'light', label:'Light: under 10 lbs'},
  {id:'medium', label:'Medium: 10\u201330 lbs'},
  {id:'heavy', label:'Heavy: 30\u201375 lbs'},
  {id:'very_heavy', label:'Very heavy: 75+ lbs'}
];
const studOptions = [
  {id:'yes', label:'Yes, I found a stud'},
  {id:'no', label:'No stud available'},
  {id:'not_sure', label:'Not sure'}
];
function skipStudQuestion(){
  return wizardState.wallType === 'concrete' || wizardState.wallType === 'hollow_door';
}
function totalSteps(){
  return skipStudQuestion() ? 3 : 4;
}
function renderHome(){
  wizardState = {step:1, wallType:'', item:'', weight:'', stud:''};
  app.innerHTML = '<h1 style="font-size:1.5rem;text-align:center;margin-bottom:8px">Which Wall Anchor Do I Need?</h1>'+
    '<p style="text-align:center;color:var(--light-text);margin-bottom:24px">Answer a few questions and get a specific fastener recommendation in 30 seconds.</p>'+
    '<div class="wizard" id="wizard"></div>'+
    '<section class="faq-section" id="faq-section"><h2 style="font-size:1.25rem;margin-bottom:16px">Frequently Asked Questions</h2></section>';
  renderWizardStep();
  renderFAQ();
}
function renderWizardStep(){
  const wiz = document.getElementById('wizard');
  if(!wiz) return;
  const s = wizardState.step;
  const total = totalSteps();
  const isResult = (skipStudQuestion() && s === 4) || (!skipStudQuestion() && s === 5);
  if(isResult){
    renderResult(wiz);
    return;
  }
  const pct = ((s-1)/total)*100;
  let html = '<div class="wizard-progress"><span>Step '+s+' of '+total+'</span><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
  if(s > 1){
    html += '<button class="btn btn-secondary btn-sm" style="margin-bottom:16px" onclick="wizardBack()" aria-label="Go back">&larr; Back</button>';
  }
  html += '<div class="wizard-step">';
  if(s === 1){
    html += '<h2 class="step-title">What type of wall?</h2><div class="card-grid">';
    wallTypes.forEach(w => {
      html += radioCard(w.id, w.label, 'wallType', wizardState.wallType);
    });
    html += '</div>';
  } else if(s === 2){
    html += '<h2 class="step-title">What are you hanging?</h2><div class="card-grid">';
    hangItems.forEach(w => {
      html += radioCard(w.id, w.label, 'item', wizardState.item);
    });
    html += '</div>';
  } else if(s === 3){
    html += '<h2 class="step-title">Approximate weight?</h2><div class="card-grid">';
    weightClasses.forEach(w => {
      html += radioCard(w.id, w.label, 'weight', wizardState.weight);
    });
    html += '</div>';
  } else if(s === 4){
    html += '<h2 class="step-title">Can you hit a stud?</h2><div class="card-grid">';
    studOptions.forEach(w => {
      html += radioCard(w.id, w.label, 'stud', wizardState.stud);
    });
    html += '</div>';
    html += '<div class="expandable"><button class="expand-toggle" onclick="toggleExpand(this)" aria-label="Show tip about finding studs"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M4 1l5 5-5 5z"/></svg> Not sure how to tell?</button><div class="expand-content"><div class="expand-inner">Knock on the wall. A hollow sound means no stud behind that spot. A solid thud means you\'ve found a stud. You can also use a $10 stud finder from any hardware store for a precise location.</div></div></div>';
  }
  html += '</div>';
  wiz.innerHTML = html;
}
function radioCard(id, label, field, current){
  const sel = current === id ? ' selected' : '';
  return '<label class="radio-card'+sel+'" onclick="wizardSelect(\''+field+'\',\''+id+'\',event)"><input type="radio" name="'+field+'" value="'+id+'"'+(current===id?' checked':'')+' aria-label="'+label.replace(/"/g,'&quot;')+'">'+label+'</label>';
}
window.wizardSelect = function(field, value, e){
  // Prevent double-fire: clicking a <label> wrapping an <input> triggers onclick twice
  // (once for the label click, once for the synthetic click on the input that bubbles up).
  if(e && e.target && e.target.tagName === 'INPUT') return;
  wizardState[field] = value;
  // Auto-advance after short delay
  setTimeout(function(){
    if(wizardState.step === 3 && skipStudQuestion()){
      wizardState.step = 4; // goes to result since skipStudQuestion
    } else {
      wizardState.step++;
    }
    renderWizardStep();
  }, 200);
};
window.wizardBack = function(){
  if(wizardState.step === 4 && skipStudQuestion()){
    // came from step 3 directly to result
    wizardState.step = 3;
  } else {
    wizardState.step--;
  }
  if(wizardState.step < 1) wizardState.step = 1;
  renderWizardStep();
};
window.toggleExpand = function(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};
window.startOver = function(){
  renderHome();
};

let selectedRating = 0;
function initStarSelector(){
  const sel = document.getElementById('star-selector');
  if(!sel) return;
  const stars = sel.querySelectorAll('.star');
  sel.addEventListener('mouseover', function(e){
    const star = e.target.closest('.star');
    if(!star) return;
    const val = parseInt(star.dataset.val);
    stars.forEach(function(s){
      s.classList.toggle('hovered', parseInt(s.dataset.val) <= val);
    });
  });
  sel.addEventListener('mouseout', function(){
    stars.forEach(function(s){ s.classList.remove('hovered'); });
  });
  sel.addEventListener('click', function(e){
    const star = e.target.closest('.star');
    if(!star) return;
    selectedRating = parseInt(star.dataset.val);
    stars.forEach(function(s){
      s.classList.toggle('selected', parseInt(s.dataset.val) <= selectedRating);
    });
  });
  sel.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      const star = e.target.closest('.star');
      if(star) star.click();
    }
  });
}

    .catch(function(){
      document.getElementById('reviews-header').innerHTML = '';
      document.getElementById('review-list').innerHTML = '<div class="empty-state">Could not load reviews. Please try again later.</div>';
    });
}
function renderReviewsHeader(data){
  const avg = data.average_rating ? parseFloat(data.average_rating).toFixed(1) : '0.0';
  const count = data.total || 0;
  const hdr = document.getElementById('reviews-header');
  if(!hdr) return;
  hdr.innerHTML = '<div class="avg-rating">'+avg+'</div>'+
    '<div class="stars-display" aria-label="'+avg+' out of 5 stars">'+starsHTML(Math.round(parseFloat(avg)))+'</div>'+
    '<div class="review-count">'+count+' review'+(count!==1?'s':'')+'</div>';
}
function starsHTML(filled){
  let s = '';
  for(let i=1;i<=5;i++) s += i<=filled ? '\u2605' : '\u2606';
  return s;
}
function renderReviewList(reviews){
  const list = document.getElementById('review-list');
  if(!list) return;
  if(!reviews.length){
    list.innerHTML = '<div class="empty-state">No reviews yet \u2014 be the first!</div>';
    return;
  }
  list.innerHTML = reviews.map(function(r){
    return '<article class="review-card">'+
      '<div class="stars" aria-label="'+r.rating+' out of 5 stars">'+starsHTML(r.rating)+'</div>'+
      '<div class="nickname">'+escapeHTML(r.nickname)+'</div>'+
      (r.comment ? '<div class="comment">'+escapeHTML(r.comment)+'</div>' : '')+
      '<div class="time">'+relativeTime(r.created_at)+'</div>'+
      '</article>';
  }).join('');
}
function escapeHTML(str){
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function relativeTime(dateStr){
  if(!dateStr) return '';
  var now = new Date();
  var then = new Date(dateStr+'Z');
  var diff = Math.floor((now - then) / 1000);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60)+' minute'+(Math.floor(diff/60)>1?'s':'')+' ago';
  if(diff < 86400) return Math.floor(diff/3600)+' hour'+(Math.floor(diff/3600)>1?'s':'')+' ago';
  if(diff < 2592000) return Math.floor(diff/86400)+' day'+(Math.floor(diff/86400)>1?'s':'')+' ago';
  return Math.floor(diff/2592000)+' month'+(Math.floor(diff/2592000)>1?'s':'')+' ago';
}
window.submitReview = function(){
  var name = document.getElementById('rev-name').value.trim();
  var comment = document.getElementById('rev-comment').value.trim();
  var msgEl = document.getElementById('form-msg');
  if(!name){
    msgEl.className = 'form-msg error';
    msgEl.textContent = 'Please enter your nickname.';
    return;
  }
  if(name.length > 30){
    msgEl.className = 'form-msg error';
    msgEl.textContent = 'Nickname must be 30 characters or fewer.';
    return;
  }
  if(!selectedRating){
    msgEl.className = 'form-msg error';
    msgEl.textContent = 'Please select a star rating.';
    return;
  }
  if(comment.length > 500){
    msgEl.className = 'form-msg error';
    msgEl.textContent = 'Comment must be 500 characters or fewer.';
    return;
  }
  msgEl.className = 'form-msg';
  msgEl.textContent = 'Submitting...';
  fetch(WORKER_URL+'/api/review',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nickname:name, rating:selectedRating, comment:comment})
  }).then(function(r){
    if(!r.ok) throw new Error('Failed');
    msgEl.className = 'form-msg success';
    msgEl.textContent = 'Thank you for your review!';
    document.getElementById('rev-name').value = '';
    document.getElementById('rev-comment').value = '';
    selectedRating = 0;
    document.querySelectorAll('#star-selector .star').forEach(function(s){ s.classList.remove('selected'); });
    fetchReviews();
  }).catch(function(){
    msgEl.className = 'form-msg error';
    msgEl.textContent = 'Could not submit review. You may have reached the rate limit (3 reviews per hour). Please try again later.';
  });
};

function renderStats(){
  app.innerHTML = '<h1 style="font-size:1.5rem;margin-bottom:24px">Visitor Statistics</h1><div class="loading" id="stats-loading">Loading stats...</div><div id="stats-content" style="display:none"></div>';
  fetch(WORKER_URL+'/api/stats')
    .then(function(r){ return r.json(); })
    .then(function(data){ renderStatsData(data); })
    .catch(function(){
      document.getElementById('stats-loading').textContent = 'Could not load stats. Please try again later.';
    });
}
function renderStatsData(data){
  document.getElementById('stats-loading').style.display = 'none';
  var c = document.getElementById('stats-content');
  c.style.display = 'block';
  var total = data.total_views || 0;
  var perDay = data.views_per_day || [];
  var referrers = data.top_referrers || [];
  var countries = data.top_countries || [];
  var html = '<div class="stats-grid"><div class="stat-card"><div class="stat-num">'+total.toLocaleString()+'</div><div class="stat-label">Total Page Views</div></div></div>';
  // Chart: views per day
  if(perDay.length){
    html += '<div class="chart-container"><h3>Views Per Day (Last 30 Days)</h3>'+buildLineChart(perDay)+'</div>';
  }
  // Top referrers
  if(referrers.length){
    var maxRef = referrers[0].count || 1;
    html += '<div class="chart-container"><h3>Top Referrers</h3><ul class="ranked-list">';
    referrers.slice(0,5).forEach(function(r){
      var label = r.referrer || '(direct)';
      html += '<li><span style="min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHTML(label)+'</span><div class="rank-bar"><div class="rank-fill" style="width:'+Math.round((r.count/maxRef)*100)+'%"></div></div><span class="rank-count">'+r.count+'</span></li>';
    });
    html += '</ul></div>';
  }
  // Top countries
  if(countries.length){
    var maxCt = countries[0].count || 1;
    function countryFlag(code){try{return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6-65+c.charCodeAt(0)))}catch(e){return'\ud83c\udff3\ufe0f'}}
    html += '<div class="chart-container"><h3>Top Countries</h3><ul class="ranked-list">';
    countries.slice(0,5).forEach(function(ct){
      var code = ct.country || '??';
      var flag = countryFlag(code);
      html += '<li><span style="min-width:100px">'+flag+' '+escapeHTML(code)+'</span><div class="rank-bar"><div class="rank-fill" style="width:'+Math.round((ct.count/maxCt)*100)+'%"></div></div><span class="rank-count">'+ct.count+'</span></li>';
    });
    html += '</ul></div>';
  }
  c.innerHTML = html;
}
function buildLineChart(perDay){
  // Build inline SVG line chart
  var W = 600, H = 200, pad = 40;
  var maxVal = 1;
  perDay.forEach(function(d){ if(d.views > maxVal) maxVal = d.views; });
  var n = perDay.length;
  if(n < 2) n = 2;
  var stepX = (W - pad*2) / (n - 1 || 1);
  var points = [];
  var labels = '';
  perDay.forEach(function(d, i){
    var x = pad + i * stepX;
    var y = H - pad - ((d.views / maxVal) * (H - pad*2));
    points.push(x+','+y);
    // Add data dots
    labels += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="#E8713A"/>';
    // X-axis labels (show every ~5th)
    if(i % Math.ceil(n/6) === 0 || i === n-1){
      var dateLabel = d.day ? d.day.slice(5) : '';
      labels += '<text x="'+x+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#636E72">'+dateLabel+'</text>';
    }
  });
  // Y-axis labels
  labels += '<text x="'+(pad-8)+'" y="'+(pad)+'" text-anchor="end" font-size="10" fill="#636E72">'+maxVal+'</text>';
  labels += '<text x="'+(pad-8)+'" y="'+(H-pad)+'" text-anchor="end" font-size="10" fill="#636E72">0</text>';
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Views per day chart">';
  // Grid lines
  svg += '<line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#E0E0E0" stroke-width="1"/>';
  svg += '<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#E0E0E0" stroke-width="1"/>';
  // Line
  svg += '<polyline points="'+points.join(' ')+'" fill="none" stroke="#E8713A" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  // Area fill
  if(points.length){
    var areaPoints = points.join(' ')+' '+(pad+(n-1)*stepX)+','+(H-pad)+' '+pad+','+(H-pad);
    svg += '<polygon points="'+areaPoints+'" fill="rgba(232,113,58,0.1)"/>';
  }
  svg += labels;
  svg += '</svg>';
  return svg;
}
})();
